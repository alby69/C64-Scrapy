sources:
  - name: "C64-Wiki"
    url: "https://www.c64-wiki.com/wiki/Main_Page"
    type: "wiki"
    priority: 1
    description: "Enciclopedia specializzata con oltre 1800 articoli tecnici e storici."

  - name: "Codebase64"
    url: "https://codebase64.org/"
    type: "wiki"
    priority: 1
    description: "La wiki piu ricca per la programmazione C64, tutorial assembly e demoscene."

  - name: "Zimmers.net Maps"
    url: "http://www.zimmers.net/anonftp/pub/cbm/maps/"
    type: "file_listing"
    priority: 2
    description: "Archivio storico di mappe di memoria e documenti tecnici."

  - name: "Ultimate C64 Reference"
    url: "https://www.pagetable.com/c64ref/"
    type: "web"
    priority: 2
    description: "Disassembly delle ROM, mappe di memoria annotate e documentazione hardware."

  - name: "Elite Memory Map"
    url: "https://elite.bbcelite.com/c64/"
    type: "web"
    priority: 3
    description: "Analisi tecnica approfondita del bank switching e struttura della memoria."

  - name: "CSDb"
    url: "https://csdb.dk/"
    type: "database"
    priority: 2
    description: "Commodore 64 Scene Database: release, musica SID, demo e sorgenti commentati."

  - name: "HVSC"
    url: "https://hvsc.c64.org/"
    type: "database"
    priority: 3
    description: "High Voltage SID Collection: oltre 58.000 file SID e documentazione chip audio."

  - name: "Archive.org C64 Programming Books"
    url: "https://archive.org/details/commodore-64-books"
    type: "archive_org"
    priority: 1
    description: "Manuali originali, Programmer's Reference Guide, Mapping the Commodore 64."

  - name: "Wikipedia C64/6510"
    url: "https://en.wikipedia.org/wiki/MOS_Technology_6510"
    type: "web"
    priority: 2
    description: "Informazioni sull'architettura della CPU 6510 e bank switching."

  - name: "6502.org"
    url: "http://www.6502.org/source/"
    type: "web"
    priority: 1
    description: "Enorme archivio di codice sorgente 6502/6510 e tutorial."

  - name: "Lemon64"
    url: "https://www.lemon64.com/forum/viewforum.php?f=8"
    type: "forum"
    priority: 2
    description: "Database giochi, recensioni e sezione tecnica dedicata al coding."

  - name: "GameBase64"
    url: "http://www.gamebase64.com/"
    type: "database"
    priority: 3
    description: "Database con oltre 18.000 titoli, recensioni e informazioni tecniche."

  - name: "GitHub mist64/c64ref"
    url: "https://github.com/mist64/c64ref"
    type: "github"
    priority: 2
    description: "Sorgenti di riferimento machine-readable per Commodore 64."

  - name: "GitHub Andras-vajda/Commodore_64"
    url: "https://github.com/Andras-vajda/Commodore_64"
    type: "github"
    priority: 2
    description: "Articoli, sorgenti Assembly e manuali CBM Prg Studio."

  - name: "masswerk.at 6502 Instruction Set"
    url: "https://www.masswerk.at/6502/6502_instruction_set.html"
    type: "web"
    priority: 1
    description: "Reference completo del set di istruzioni MOS 6502/6510."

  - name: "pagetable.com 6502 Reference"
    url: "https://www.pagetable.com/c64ref/6502/"
    type: "web"
    priority: 1
    description: "Opcode 6502/6510 incluse istruzioni non documentate."

  - name: "sta.c64.org Memory Map"
    url: "https://sta.c64.org/cbm64mem.html"
    type: "web"
    priority: 1
    description: "Mappa di memoria C64 molto dettagliata."

  - name: "sta.c64.org CBM Docs"
    url: "https://sta.c64.org/cbmdocs.html"
    type: "web"
    priority: 2
    description: "Raccolta di documentazione tecnica CBM."

  - name: "Archive.org C64 Manuals (Zimmers mirror)"
    url: "http://www.zimmers.net/anonftp/pub/cbm/c64/manuals/"
    type: "file_listing"
    priority: 1
    description: "Mirror FUNET dei manuali originali Commodore."

  - name: "Archive.org Mapping the Commodore 64"
    url: "https://archive.org/details/The_Master_Memory_Map_for_the_Commodore_64"
    type: "archive_org"
    priority: 1
    description: "Master Memory Map for the Commodore 64 in versione digitale."

  - name: "Archive.org C64 Programmer's Reference Guide"
    url: "https://archive.org/details/commodore-64-programmers-reference-guide_202205"
    type: "archive_org"
    priority: 1
    description: "Manuale ufficiale Commodore 1983: BASIC V2, ML, grafica, audio, I/O, sprite."

  - name: "commodore.ca Magazine Archive"
    url: "https://www.commodore.ca/commodore-gallery/commodore-magazine-articles/"
    type: "archive_org"
    priority: 2
    description: "Archivio di Compute!, Compute!'s Gazette e Ahoy! Magazine."

  - name: "Archive.org Zzap!64 Collection"
    url: "https://archive.org/search?query=zzap+64+magazine"
    type: "archive_org"
    priority: 3
    description: "Collezione digitale di Zzap!64 (UK, 1985-1992)."

  - name: "KickAssembler"
    url: "http://theweb.dk/KickAssembler/"
    type: "tool"
    priority: 1
    description: "Assembler cross-platform per C64 con scripting avanzato e macro."

  - name: "VICE Emulator"
    url: "https://vice-emu.sourceforge.io/"
    type: "tool"
    priority: 1
    description: "Emulatore multi-piattaforma per C64 con monitor machine language."

  - name: "CBM prg Studio"
    url: "https://www.ajordison.co.uk/"
    type: "tool"
    priority: 2
    description: "IDE Windows per sviluppo C64."

  - name: "Visual 6502"
    url: "http://visual6502.org/"
    type: "web"
    priority: 3
    description: "Simulazione transistor-level del processore MOS 6502."

  - name: "Project 64"
    url: "https://project64.c64.org/"
    type: "web"
    priority: 2
    description: "Archivio di manuali Commodore trascritti in testo puro."

  - name: "Retro64.altervista.org"
    url: "https://retro64.altervista.org/"
    type: "web"
    priority: 3
    description: "Blog tecnico italiano su programmazione Assembly 6502/6510."

  - name: "bombjack.org Commodore Archive"
    url: "https://commodore.bombjack.org/"
    type: "web"
    priority: 2
    description: "Ampio archivio di riviste, libri e documentazione Commodore scansionati."
