site_name: "C64 Programming Documentation Hub"
site_description: "Assembly & BASIC technical documentation, tutorials, and registers mapping for Commodore 64."
theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.tabs
    - search.highlight

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - admonition
  - def_list

nav:
  - Home: index.md
  - Reference & Hardware:
    - STA C64: sta_c64/
    - C64 Wiki: www_c64-wiki_com/
  - Tutorials & Guides:
    - Dustlayer: dustlayer/
    - BBC Elite Deep Dives: elite_bbcelite_com/
    - Codebase64 Wiki: codebase_c64/
  - Manuals & Code:
    - Archive.org: archive_org/
